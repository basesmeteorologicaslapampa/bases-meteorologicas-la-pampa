name: CI

on:
  push:
    branches: [main]
    paths:
      - "weather-dashboard/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "weather-dashboard/**"
      - ".github/workflows/ci.yml"

# Cancelar runs anteriores si hay un push nuevo en el mismo branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: weather-dashboard

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: weather-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: weather-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tsc --noEmit
        run: npm run type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: weather-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          # Placeholders - el build no necesita valores reales porque
          # src/lib/supabase.ts tiene fallbacks. Las env vars reales
          # estan configuradas en Vercel y se usan en runtime.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
